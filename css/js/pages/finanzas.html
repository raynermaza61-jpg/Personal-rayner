<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayner Dashboard - Finanzas</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="css/finanzas.css">
</head>
<body>
    <div class="page-container">
        <!-- HEADER -->
        <div class="page-header">
            <h1 class="page-title neon-glow">💰 SISTEMA FINANCIERO</h1>
            <a href="dashboard.html" class="btn-back">← Volver</a>
        </div>

        <!-- CONTENEDOR PRINCIPAL -->
        <div class="finances-container">
            
            <!-- SECCIÓN: ESTADO ACTUAL -->
            <div class="section-state">
                <div class="card state-card">
                    <div class="state-content">
                        <div class="state-item">
                            <p class="state-label">TOTAL AHORRADO</p>
                            <p id="totalSaved" class="amount-display amount-positive neon-glow">S/. 0.00</p>
                        </div>
                        
                        <div class="state-item">
                            <p class="state-label">META DIARIA</p>
                            <p class="amount-display amount-neutral">S/. 10.00</p>
                        </div>

                        <div class="state-item">
                            <p class="state-label">DEUDA ACTUAL</p>
                            <p id="debtAmount" class="amount-display amount-debt">S/. 0.00</p>
                        </div>

                        <div class="state-item">
                            <p class="state-label">PROGRESO ANUAL</p>
                            <p id="goalPercentage" class="amount-display amount-neutral">0%</p>
                        </div>
                    </div>
                </div>

                <!-- BARRA DE PROGRESO -->
                <div class="progress-section">
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <p class="progress-text">Progreso hacia tu meta anual</p>
                </div>
            </div>

            <!-- SECCIÓN: INGRESOS Y RETIROS -->
            <div class="section-transactions">
                <div class="card">
                    <h2 class="card-title">📥 AGREGAR DINERO</h2>
                    <form id="addMoneyForm" class="form-transaction">
                        <div class="form-group">
                            <label class="form-label">Cantidad a ahorrar (S/.)</label>
                            <input 
                                type="number" 
                                id="addMoneyAmount" 
                                class="form-input" 
                                placeholder="ej: 25.50"
                                step="0.01"
                                min="0.01"
                                max="99999"
                                required
                            >
                        </div>
                        <button type="submit" class="btn btn-add">➕ AGREGAR</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="card-title">📤 RETIRAR DINERO</h2>
                    <form id="withdrawMoneyForm" class="form-transaction">
                        <div class="form-group">
                            <label class="form-label">Cantidad a retirar (S/.)</label>
                            <input 
                                type="number" 
                                id="withdrawMoneyAmount" 
                                class="form-input" 
                                placeholder="ej: 5.00"
                                step="0.01"
                                min="0.01"
                                max="99999"
                                required
                            >
                        </div>
                        <button type="submit" class="btn btn-withdraw">➖ RETIRAR</button>
                    </form>
                </div>
            </div>

            <!-- SECCIÓN: GRÁFICOS -->
            <div class="card">
                <h2 class="card-title">📊 GRÁFICO DE MOVIMIENTOS</h2>
                
                <div class="chart-controls">
                    <button class="chart-btn active" data-period="week">Semana</button>
                    <button class="chart-btn" data-period="month">Mes</button>
                    <button class="chart-btn" data-period="year">Año</button>
                </div>

                <div class="chart-container">
                    <canvas id="financeChart" width="800" height="400"></canvas>
                </div>

                <button id="historyBtn" class="btn btn-history">📋 VER HISTORIAL</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE HISTORIAL -->
    <div id="historyModal" class="modal hidden">
        <div class="modal-content">
            <button id="closeHistoryBtn" class="modal-close">✕</button>
            <div id="historyContent" class="history-content"></div>
        </div>
    </div>

    <!-- OVERLAY DEL MODAL -->
    <div id="historyOverlay" class="modal-overlay hidden" onclick="document.getElementById('historyModal').classList.add('hidden'); document.getElementById('historyOverlay').classList.add('hidden');"></div>

    <!-- BOTÓN DE LOGOUT -->
    <button class="logout-btn">SALIR</button>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/finanzas.js"></script>
</body>
</html>
